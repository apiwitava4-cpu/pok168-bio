<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P9 BIO</title>
<meta name="theme-color" content="#090704">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #050402;
  --panel: rgba(8, 8, 8, .72);
  --text: #fff8e4;
  --muted: rgba(255, 248, 228, .82);
  --accent: #f2b914;
  --gold: #f2b914;
  --gold-soft: #fff1a7;
  --gold-deep: #9c6408;
  --line: rgba(255, 255, 255, .16);
  --bio-background-image: url("p9/bio-background.webp");
  font-family: Arial, "Tahoma", sans-serif;
}

body {
  position: relative;
  min-height: 100vh;
  padding: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  background: var(--bg) var(--bio-background-image) center / cover fixed no-repeat;
  isolation: isolate;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    linear-gradient(180deg, rgba(4, 4, 4, .18), rgba(4, 4, 4, .86)),
    linear-gradient(90deg, rgba(0, 0, 0, .34), transparent 42%, rgba(0, 0, 0, .34));
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, .34) 100%),
    rgba(2, 2, 1, .18);
  backdrop-filter: blur(2px) saturate(1.05);
}

.card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 408px;
  padding: 22px;
  text-align: center;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow:
    0 22px 70px rgba(0, 0, 0, .42),
    0 1px 0 rgba(255, 255, 255, .08) inset;
  backdrop-filter: blur(18px) saturate(1.12);
}

.card::before {
  content: none;
}

.profile {
  width: 132px;
  height: 132px;
  margin: 0 auto 18px;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, .22);
  border-radius: 8px;
  background: #050505;
  box-shadow:
    0 12px 34px rgba(0, 0, 0, .38),
    0 0 0 1px rgba(255, 255, 255, .08) inset;
}

.profile img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
}

h1 {
  margin-bottom: 8px;
  color: #fff;
  font-size: 30px;
  line-height: 1.15;
  text-shadow: 0 10px 28px rgba(0, 0, 0, .35);
}

p {
  margin-bottom: 22px;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.55;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 50px;
  margin-bottom: 10px;
  padding: 13px 16px;
  border: 1px solid rgba(255, 255, 255, .18);
  border-radius: 8px;
  color: #fff;
  background: rgba(255, 255, 255, .1);
  font-size: 16px;
  font-weight: 700;
  line-height: 1.25;
  text-decoration: none;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(0, 0, 0, .18);
  transition: transform .18s ease, background .18s ease, border-color .18s ease;
}

#bioButtons .btn:first-child {
  color: #17120a;
  border-color: rgba(255, 231, 145, .55);
  background: linear-gradient(180deg, #fff4bd, var(--accent));
}

.btn:hover,
.btn:focus-visible {
  transform: translateY(-1px);
  border-color: rgba(255, 255, 255, .36);
  background: rgba(255, 255, 255, .16);
  outline: none;
}

#bioButtons .btn:first-child:hover,
#bioButtons .btn:first-child:focus-visible {
  background: linear-gradient(180deg, #fff8d6, #ffc928);
}

footer {
  margin-top: 12px;
  color: rgba(255, 248, 228, .5);
  font-size: 13px;
}

.modal {
  position: fixed;
  inset: 0;
  z-index: 999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: rgba(0, 0, 0, .78);
  backdrop-filter: blur(10px);
}

.modal.is-open {
  display: flex;
}

.modal-content {
  position: relative;
  width: 100%;
  max-width: 900px;
  max-height: 88vh;
  overflow: auto;
  padding: 22px;
  background: rgba(10, 10, 10, .94);
  border: 1px solid rgba(255, 255, 255, .14);
  border-radius: 8px;
  box-shadow: 0 20px 65px rgba(0, 0, 0, .56);
  backdrop-filter: blur(18px);
}

.close {
  position: absolute;
  top: 12px;
  right: 14px;
  width: 36px;
  height: 36px;
  border: 0;
  border-radius: 8px;
  color: #fff;
  background: rgba(255, 255, 255, .1);
  font-size: 26px;
  line-height: 1;
  cursor: pointer;
}

.close:hover,
.close:focus-visible {
  background: rgba(255, 255, 255, .18);
  outline: none;
}

.modal h2 {
  padding-right: 38px;
  color: #fff;
  text-align: center;
  font-size: 24px;
  line-height: 1.25;
}

.gallery {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  margin-top: 20px;
}

.promo-card {
  margin: 0;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, .14);
  border-radius: 8px;
  background: #050505;
  box-shadow: none;
}

.promo-card img {
  display: block;
  width: 100%;
  aspect-ratio: 4 / 3;
  object-fit: contain;
  background: #050505;
}

.promo-card figcaption {
  padding: 10px 12px;
  color: rgba(255, 248, 228, .88);
  font-size: 15px;
  font-weight: 700;
  line-height: 1.35;
  text-align: center;
}

@media (min-width: 600px) {
  .gallery {
    grid-template-columns: 1fr 1fr;
  }
}

@media (max-width: 380px) {
  body {
    padding: 18px;
  }

  .card {
    padding: 22px;
  }

  .profile {
    width: 118px;
    height: 118px;
  }

  h1 {
    font-size: 28px;
  }

  .btn {
    font-size: 16px;
  }
}
</style>
</head>

<body>
<main class="card">
  <div class="profile" aria-label="P9">
    <img id="bioProfileImage" src="p9/brand-profile.webp" alt="P9">
  </div>

  <h1 id="bioTitle">P9</h1>
  <p id="bioSubtitle">บ้านป๊อกเด้งออนไลน์</p>

  <div id="bioButtons">
  <a
    class="btn"
    href="https://www.pok9thai.com/?utm_source=bio&utm_medium=button&utm_campaign=p9_service"
    data-track-id="visit-site"
    data-track-label="เข้าชมหน้าเว็บ"
    target="_blank"
    rel="noopener noreferrer">
    เข้าชมหน้าเว็บ
  </a>

  <a
    class="btn"
    href="https://ag.p9deng.com/?code=AG0239EW&utm_source=bio&utm_medium=button&utm_campaign=p9_service"
    data-track-id="register"
    data-track-label="สมัครสมาชิก"
    target="_blank"
    rel="noopener noreferrer">
    สมัครสมาชิก
  </a>

  <a class="btn" href="#" id="promoBtn" role="button" aria-controls="promoModal" aria-expanded="false" data-track-id="promotion" data-track-label="โปรโมชั่น">
    โปรโมชั่น
  </a>

  <a
    class="btn"
    href="https://lin.ee/tQqumsi?utm_source=bio&utm_medium=button&utm_campaign=p9_service"
    data-track-id="contact-admin"
    data-track-label="ติดต่อแอดมิน"
    target="_blank"
    rel="noopener noreferrer">
    ติดต่อแอดมิน
  </a>

  </div>

  <footer id="bioFooter">&copy; P9 BIO</footer>
</main>

<div class="modal" id="promoModal" aria-hidden="true">
  <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="promoTitle">
    <button class="close" type="button" aria-label="ปิดหน้าต่าง">&times;</button>
    <h2 id="promoTitle">โปรโมชั่นล่าสุด</h2>

    <div class="gallery" id="promoGallery">
      <figure class="promo-card">
        <img src="promo/promo-new-member.webp" alt="โปรโมชั่นสมาชิกใหม่">
        <figcaption>สมาชิกใหม่</figcaption>
      </figure>

      <figure class="promo-card">
        <img src="promo/promo-daily-10.webp" alt="โปรโมชั่นรับ 10 เปอร์เซ็นต์ทุกวัน">
        <figcaption>รับ 10% ทุกวัน</figcaption>
      </figure>

      <figure class="promo-card">
        <img src="promo/promo-cashback-2.webp" alt="โปรโมชั่นคืนยอด 2 เปอร์เซ็นต์">
        <figcaption>คืนยอด 2%</figcaption>
      </figure>

      <figure class="promo-card">
        <img src="promo/promo-special-event.webp" alt="โปรโมชั่นกิจกรรมพิเศษ">
        <figcaption>กิจกรรมพิเศษ</figcaption>
      </figure>

      <figure class="promo-card">
        <img src="promo/promo-pokdeng-online.webp" alt="โปรโมชั่นป๊อกเด้งออนไลน์">
        <figcaption>ป๊อกเด้งออนไลน์</figcaption>
      </figure>

      <figure class="promo-card">
        <img src="promo/promo-5.webp" alt="โปรโมชั่น 5">
        <figcaption>โปรโมชั่น 5</figcaption>
      </figure>
    </div>
  </div>
</div>

<script>
const clickStatsKey = "p9BioClickStats";
const trackedButtonDefaults = {
  "visit-site": "เข้าชมหน้าเว็บ",
  "register": "สมัครสมาชิก",
  "promotion": "โปรโมชั่น",
  "contact-admin": "ติดต่อแอดมิน"
};

const defaultBioConfig = {
  title: "P9",
  subtitle: "บ้านป๊อกเด้งออนไลน์",
  profileImage: "p9/brand-profile.webp",
  backgroundImage: "p9/bio-background.webp",
  footer: "© P9 BIO",
  buttons: [
    {
      id: "visit-site",
      label: "เข้าชมหน้าเว็บ",
      href: "https://www.pok9thai.com/?utm_source=bio&utm_medium=button&utm_campaign=p9_service",
      trackId: "visit-site",
      action: "link",
      enabled: true,
      targetBlank: true
    },
    {
      id: "register",
      label: "สมัครสมาชิก",
      href: "https://ag.p9deng.com/?code=AG0239EW&utm_source=bio&utm_medium=button&utm_campaign=p9_service",
      trackId: "register",
      action: "link",
      enabled: true,
      targetBlank: true
    },
    {
      id: "promotion",
      label: "โปรโมชั่น",
      href: "#",
      trackId: "promotion",
      action: "promo",
      enabled: true,
      targetBlank: false
    },
    {
      id: "contact-admin",
      label: "ติดต่อแอดมิน",
      href: "https://lin.ee/tQqumsi?utm_source=bio&utm_medium=button&utm_campaign=p9_service",
      trackId: "contact-admin",
      action: "link",
      enabled: true,
      targetBlank: true
    }
  ],
  promoImages: [
    { id: "promo-new-member", src: "promo/promo-new-member.webp", caption: "สมาชิกใหม่", alt: "โปรโมชั่นสมาชิกใหม่", enabled: true },
    { id: "promo-daily-10", src: "promo/promo-daily-10.webp", caption: "รับ 10% ทุกวัน", alt: "โปรโมชั่นรับ 10 เปอร์เซ็นต์ทุกวัน", enabled: true },
    { id: "promo-cashback-2", src: "promo/promo-cashback-2.webp", caption: "คืนยอด 2%", alt: "โปรโมชั่นคืนยอด 2 เปอร์เซ็นต์", enabled: true },
    { id: "promo-special-event", src: "promo/promo-special-event.webp", caption: "กิจกรรมพิเศษ", alt: "โปรโมชั่นกิจกรรมพิเศษ", enabled: true },
    { id: "promo-pokdeng-online", src: "promo/promo-pokdeng-online.webp", caption: "ป๊อกเด้งออนไลน์", alt: "โปรโมชั่นป๊อกเด้งออนไลน์", enabled: true },
    { id: "promo-5", src: "promo/promo-5.webp", caption: "โปรโมชั่น 5", alt: "โปรโมชั่น 5", enabled: true }
  ]
};

function cleanSourceId(value) {
  return String(value || "")
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9_-]+/g, "-")
    .replace(/^-+|-+$/g, "")
    .slice(0, 60);
}

function getCurrentBioSource() {
  const params = new URLSearchParams(window.location.search);
  const sourceId = cleanSourceId(
    params.get("ref") ||
    params.get("source") ||
    params.get("bio") ||
    params.get("utm_source")
  ) || "direct";

  return {
    id: sourceId,
    name: params.get("source_name") || params.get("utm_campaign") || sourceId,
    url: window.location.href
  };
}

const currentBioSource = getCurrentBioSource();

function escapeHtml(value) {
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function safeCssUrl(value) {
  return String(value || "p9/bio-background.webp").replace(/["\\\n\r]/g, "");
}

function mergeBioConfig(config) {
  const input = config && typeof config === "object" ? config : {};
  return {
    ...defaultBioConfig,
    ...input,
    buttons: Array.isArray(input.buttons) ? input.buttons : defaultBioConfig.buttons,
    promoImages: Array.isArray(input.promoImages) ? input.promoImages : defaultBioConfig.promoImages
  };
}

function renderBioConfig(config) {
  const normalized = mergeBioConfig(config);
  const profileImage = document.getElementById("bioProfileImage");
  const buttons = document.getElementById("bioButtons");
  const gallery = document.getElementById("promoGallery");

  document.getElementById("bioTitle").textContent = normalized.title || "P9";
  document.getElementById("bioSubtitle").textContent = normalized.subtitle || "";
  document.getElementById("bioFooter").textContent = normalized.footer || "© P9 BIO";
  document.documentElement.style.setProperty("--bio-background-image", `url("${safeCssUrl(normalized.backgroundImage)}")`);
  profileImage.src = normalized.profileImage || "p9/brand-profile.webp";
  profileImage.alt = normalized.title || "P9";

  buttons.innerHTML = normalized.buttons
    .filter(function (button) {
      return button && button.enabled !== false && button.label;
    })
    .map(function (button) {
      const action = button.action === "promo" ? "promo" : "link";
      const id = cleanSourceId(button.id || button.trackId || button.label) || "button";
      const trackId = cleanSourceId(button.trackId || id) || id;
      const href = action === "promo" ? "#" : (button.href || "#");
      const target = action === "promo" || button.targetBlank === false ? "" : ' target="_blank" rel="noopener noreferrer"';
      const promoAttrs = action === "promo" ? ' id="promoBtn" role="button" aria-controls="promoModal" aria-expanded="false" data-promo-button="true"' : "";

      return `<a class="btn" href="${escapeHtml(href)}" data-track-id="${escapeHtml(trackId)}" data-track-label="${escapeHtml(button.label)}"${promoAttrs}${target}>${escapeHtml(button.label)}</a>`;
    }).join("");

  gallery.innerHTML = normalized.promoImages
    .filter(function (image) {
      return image && image.enabled !== false && image.src;
    })
    .map(function (image) {
      const caption = image.caption || "โปรโมชั่น";
      return `
        <figure class="promo-card">
          <img src="${escapeHtml(image.src)}" alt="${escapeHtml(image.alt || caption)}">
          <figcaption>${escapeHtml(caption)}</figcaption>
        </figure>
      `;
    }).join("") || '<p class="empty-state">ยังไม่มีรูปโปรโมชั่น</p>';
}

async function loadBioConfig() {
  if (window.location.protocol === "file:") {
    renderBioConfig(defaultBioConfig);
    return;
  }

  try {
    const configUrl = currentBioSource.id && currentBioSource.id !== "direct"
      ? `/api/bio-config?ref=${encodeURIComponent(currentBioSource.id)}`
      : "/api/bio-config";
    const response = await fetch(configUrl, { cache: "no-store" });
    if (!response.ok) {
      throw new Error("config_failed");
    }
    renderBioConfig(await response.json());
  } catch (error) {
    renderBioConfig(defaultBioConfig);
  }
}

function createClickStats() {
  return {
    version: 1,
    createdAt: new Date().toISOString(),
    updatedAt: null,
    totalClicks: 0,
    buttons: Object.fromEntries(
      Object.entries(trackedButtonDefaults).map(function ([id, label]) {
        return [id, { id: id, label: label, count: 0, lastClickedAt: null }];
      })
    ),
    events: []
  };
}

function loadClickStats() {
  try {
    const saved = JSON.parse(localStorage.getItem(clickStatsKey));
    const stats = saved && typeof saved === "object" ? saved : createClickStats();

    Object.entries(trackedButtonDefaults).forEach(function ([id, label]) {
      if (!stats.buttons) {
        stats.buttons = {};
      }

      if (!stats.buttons[id]) {
        stats.buttons[id] = { id: id, label: label, count: 0, lastClickedAt: null };
      }
    });

    if (!Array.isArray(stats.events)) {
      stats.events = [];
    }

    if (typeof stats.totalClicks !== "number") {
      stats.totalClicks = Object.values(stats.buttons).reduce(function (sum, button) {
        return sum + (Number(button.count) || 0);
      }, 0);
    }

    return stats;
  } catch (error) {
    return createClickStats();
  }
}

function saveClickStats(stats) {
  try {
    localStorage.setItem(clickStatsKey, JSON.stringify(stats));
  } catch (error) {
    console.warn("Unable to save click stats", error);
  }
}

function sendClickToBackend(clickEvent) {
  if (window.location.protocol === "file:") {
    return;
  }

  const payload = JSON.stringify(clickEvent);

  if (navigator.sendBeacon) {
    try {
      const sent = navigator.sendBeacon("/api/clicks", new Blob([payload], { type: "application/json" }));
      if (sent) {
        return;
      }
    } catch (error) {
      console.warn("Unable to send click with beacon", error);
    }
  }

  fetch("/api/clicks", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: payload,
    keepalive: true
  }).catch(function (error) {
    console.warn("Unable to send click stats", error);
  });
}

function recordClick(button) {
  const id = button.dataset.trackId;
  const label = button.dataset.trackLabel || trackedButtonDefaults[id] || button.textContent.trim();
  const now = new Date().toISOString();
  const stats = loadClickStats();
  const clickEvent = {
    id: id,
    label: label,
    href: button.getAttribute("href") || "",
    page: `${window.location.pathname || "index.html"}${window.location.search || ""}`,
    sourceId: currentBioSource.id,
    sourceName: currentBioSource.name,
    sourceUrl: currentBioSource.url,
    clickedAt: now
  };

  if (!stats.buttons[id]) {
    stats.buttons[id] = { id: id, label: label, count: 0, lastClickedAt: null };
  }

  stats.buttons[id].label = label;
  stats.buttons[id].count += 1;
  stats.buttons[id].lastClickedAt = now;
  stats.totalClicks += 1;
  stats.updatedAt = now;
  stats.events.unshift(clickEvent);
  stats.events = stats.events.slice(0, 200);

  saveClickStats(stats);
  sendClickToBackend(clickEvent);
}

const modal = document.getElementById("promoModal");
const bioButtons = document.getElementById("bioButtons");
const closeBtn = document.querySelector(".close");

function openModal() {
  const promoBtn = document.querySelector("[data-promo-button]");
  modal.classList.add("is-open");
  modal.setAttribute("aria-hidden", "false");
  if (promoBtn) {
    promoBtn.setAttribute("aria-expanded", "true");
  }
  closeBtn.focus();
}

function closeModal() {
  const promoBtn = document.querySelector("[data-promo-button]");
  modal.classList.remove("is-open");
  modal.setAttribute("aria-hidden", "true");
  if (promoBtn) {
    promoBtn.setAttribute("aria-expanded", "false");
    promoBtn.focus();
  }
}

bioButtons.addEventListener("click", function (event) {
  const button = event.target.closest("[data-track-id]");
  if (!button) {
    return;
  }

  recordClick(button);

  if (button.dataset.promoButton === "true") {
    event.preventDefault();
    openModal();
  }
});

closeBtn.addEventListener("click", closeModal);

modal.addEventListener("click", function (event) {
  if (event.target === modal) {
    closeModal();
  }
});

document.addEventListener("keydown", function (event) {
  if (event.key === "Escape" && modal.classList.contains("is-open")) {
    closeModal();
  }
});

loadBioConfig();
</script>
</body>
</html>
