services:
  - type: web
    name: p9-bio-analytics
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: DASHBOARD_USER
        value: admin
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: META_PIXEL_ID
        value: "1486638606565223"
      - key: META_CAPI_ACCESS_TOKEN
        sync: false
      - key: META_GRAPH_API_VERSION
        value: v25.0
    disk:
      name: p9-bio-data
      mountPath: /var/data
      sizeGB: 1
